name: Vercel Build and Deploy

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      flags:
        type: string
        required: true
      allow_missing_project:
        type: boolean
        required: false
        default: false
    secrets:
      vercel_project_id:
        description: "Vercel Project ID"
        required: true
      vercel_org_id:
        description: "Vercel ORG ID"
        required: true
      vercel_token:
        description: "Vercel TOKEN"
        required: true

env:
  VERCEL_ORG_ID: ${{ secrets.vercel_org_id }}
  VERCEL_PROJECT_ID: ${{ secrets.vercel_project_id }}

jobs:
  build-deploy:
    if: ${{ github.actor != 'dependabot' && github.event.pull_request.head.repo.fork == false }}
    runs-on: [arc-runner-set]
    steps:
      - name: Print Vercel Project ID
        run: |
          echo "Vercel Project ID: ${{ env.VERCEL_PROJECT_ID }}"

      - name: Install Git
        run: sudo apt-get update && sudo apt-get install -y git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm dependencies
        uses: ./.github/actions/install-pnpm-dependencies

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Pull Vercel Environment Information
        id: vercel_pull
        run: |
          set +e
          output=$(vercel pull --yes --environment=${{ inputs.environment }} --token=${{ secrets.vercel_token }} 2>&1)
          status=$?
          set -e
          echo "$output"

          if [ "$status" -eq 0 ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ inputs.allow_missing_project }}" = "true" ] && echo "$output" | grep -qi "Project not found"; then
            echo "::warning::Vercel project not found for this target. Skipping deployment."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          exit "$status"

      - name: Build Project Artifacts
        if: steps.vercel_pull.outputs.can_deploy == 'true'
        run: vercel build ${{ inputs.flags }} --token=${{ secrets.vercel_token }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.vercel_pull.outputs.can_deploy == 'true'
        run: vercel deploy --prebuilt ${{ inputs.flags }} --force --token=${{ secrets.vercel_token }}

      - name: Skip deploy due to missing Vercel project
        if: steps.vercel_pull.outputs.can_deploy == 'false'
        run: echo "Skipping deploy because Vercel project was not found for this target."
